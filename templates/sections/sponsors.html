<section class="sponsors">
  <h1 class="pb-6">Sponsors</h1>
  <div class="sponsors-grid">
      {% if section.extra.premier_partner_sponsors %}
        <h2>Premier Partner</h2>
        <div class="sponsors-grid--main_partners">
          {% for sponsor in section.extra.premier_partner_sponsors %}
            <a href="{{ sponsor.link }}" aria-label="{{ sponsor.title }}" rel="noopener noreferrer" target="_blank">
              {% set meta = get_image_metadata(path=sponsor.image) %}
              <img
                alt="{{ sponsor.title }}"
                src="{{ sponsor.image }}"
                width="{{ meta.width }}"
                height="{{ meta.height }}"
                loading="lazy"
              />
            </a>
          {% endfor %}
          </div>
      {% endif %}
  </div>
</section>
